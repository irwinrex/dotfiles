#======================================================================
# Core Settings 
#======================================================================

# Support 256 colors and TrueColor (RGB)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ",*:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%&%d::%p1%{255}%&%d%;m' # undercurl colors

# Performance & Behavior
set -g history-limit 1000000 # Increase history
set -g mouse on
set -sg escape-time 0        # No delay for escape key
set -g focus-events on       # Allow apps inside tmux to sense focus
set -g aggressive-resize on  # Useful for multi-monitor setups
set -g allow-passthrough on  # Allow programs like Yazi/Lazygit to show images

# Stability
set -g assume-paste-time 0

#======================================================================
# Prefix & Indexing
#======================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ======================================================================
# CATPPUCCIN CLEAN CENTERED STATUS (Stable Layout)
# ======================================================================

# ----------------------------
# STATUS BAR BEHAVIOR
# ----------------------------
set -g status-position bottom
set -g status-interval 1

# Use solid background (prevents 1px glyph glitches)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# True centering of window list
set -g status-justify centre

# Prevent layout distortion
set -g status-left-length 40
set -g status-right-length 80


# ======================================================================
# STATUS LEFT — SESSION
# ======================================================================

set -g status-left "#[bg=#313244,fg=#a6e3a1,bold] 󰆍  #[fg=#cdd6f4,bold]#S #[bg=#1e1e2e] "


# ======================================================================
# STATUS RIGHT — CURRENT DIRECTORY
# ======================================================================

set -g status-right "#[bg=#313244,fg=#f5c2e7,bold] 󰉋  #[fg=#cdd6f4]#{b:pane_current_path} #[bg=#1e1e2e] "


# ======================================================================
# WINDOWS (Clean Segmented Blocks — No Powerline)
# ======================================================================

# Inactive Window
setw -g window-status-format \
"#[bg=#313244,fg=#89b4fa] #I #[bg=#45475a,fg=#cdd6f4] #W #[bg=#1e1e2e] "

# Active Window
setw -g window-status-current-format \
"#[bg=#fab387,fg=#1e1e2e,bold] #I #[bg=#45475a,fg=#ffffff,bold] #W #[bg=#1e1e2e] "

# Spacing
setw -g window-status-separator "  "

# Remove weird visual leftovers
setw -g window-status-style "bg=#1e1e2e"
setw -g window-status-current-style "bg=#1e1e2e"


# ======================================================================
# OPTIONAL QUALITY IMPROVEMENTS
# ======================================================================

# Better UTF-8 handling
set -g utf8 on

# Reduce flicker
set -g escape-time 10

# Improve terminal compatibility
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
#======================================================================
# Keybindings
#======================================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "✅ Config reloaded"

# --- FLOATING POPUP (Modern Scratchpad) ---
# Press Alt+g to toggle a floating terminal overlay!
bind -n M-g display-popup -E "tmux new-session -A -s scratch"

# Splits (preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- PANE NAVIGATION (Alt + hjkl) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- WINDOW NAVIGATION (Prefix + h/l) ---
bind h previous-window
bind l next-window
bind j swap-window -t -1 \; previous-window
bind k swap-window -t +1 \; next-window

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

#======================================================================
# Plugins (TPM)
#======================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Ensure TPM is installed
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Let tmux-yank handle clipboard
set -g set-clipboard on

# TPM Init (MUST be last)
run '~/.config/tmux/plugins/tpm/tpm'
