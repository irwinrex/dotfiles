# =======================================================================================
# █▀▄▀█ █ █▄░█ █ █▀▄▀█ ▄▀█ █░░   ▀█▀ █▀▄▀█ █░█ ▀▄▀
# █░▀░█ █ █░▀█ █ █░▀░█ █▀█ █▄▄   ░█░ █░▀░█ █▄█ █░█
# =======================================================================================

# =======================================================================================
# CORE
# =======================================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g history-limit 1000000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g assume-paste-time 0
set -g allow-passthrough on
set -g set-clipboard on

# =======================================================================================
# PREFIX
# =======================================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# =======================================================================================
# APPEARANCE (terminal theme passthrough)
# =======================================================================================

set -g status-position bottom
set -g status-interval 2

set -g status-style "bg=default,fg=default"
set -g message-style "bg=default,fg=default"

set -g pane-border-lines rounded
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour45"

setw -g window-style "bg=default"
setw -g window-active-style "bg=default"

set -g status-left-length 60
set -g status-right-length 100

# Session highlight
set -g status-left "#[bold,fg=colour45]#S#[default] "

# Path on right
set -g status-right "#{b:pane_current_path}"

# Center window list
set -g status-justify centre

setw -g window-status-format "#[fg=colour245]#I:#W"
setw -g window-status-current-format "#[bold,fg=colour45]#I:#W"

# =======================================================================================
# KEYBINDINGS
# =======================================================================================

# Reload config
bind r source-file ~/.config/tmux/.tmux.conf \; display-message "tmux config reloaded"

# ---------------------------------------------------------------------------------------
# Pane Splitting
# ---------------------------------------------------------------------------------------

unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ---------------------------------------------------------------------------------------
# Pane Navigation (Neovim safe)
# ---------------------------------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------------------------------------------
# Window Navigation
# ---------------------------------------------------------------------------------------

bind H previous-window
bind L next-window
bind J swap-window -t -1 \; previous-window
bind K swap-window -t +1 \; next-window

# ---------------------------------------------------------------------------------------
# Pane Resizing
# ---------------------------------------------------------------------------------------

bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# ---------------------------------------------------------------------------------------
# Kill Pane
# ---------------------------------------------------------------------------------------

bind x kill-pane

# ---------------------------------------------------------------------------------------
# Copy Mode
# ---------------------------------------------------------------------------------------

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------------------
# Popup Scratch Terminal
# ---------------------------------------------------------------------------------------

bind -n M-g display-popup -w "80%" -h "80%" -E "tmux new-session -A -s scratch"

# =======================================================================================
# PLUGINS
# =======================================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

if-shell '[ ! -d ~/.config/tmux/plugins/tpm ]' \
 'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins"'

run '~/.config/tmux/plugins/tpm/tpm'
