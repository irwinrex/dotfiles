# =======================================================================================
# █▀▄▀█ █ █▄░█ █ █▀▄▀█ ▄▀█ █░░   ▀█▀ █▀▄▀█ █░█ ▀▄▀
# █░▀░█ █ █░▀█ █ █░▀░█ █▀█ █▄▄   ░█░ █░▀░█ █▄█ █░█
# =======================================================================================
# =======================================================================================
# CORE
# =======================================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g history-limit 1000000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g assume-paste-time 0
set -g allow-passthrough on
set -g set-clipboard on

# =======================================================================================
# PREFIX
# =======================================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# =======================================================================================
# APPEARANCE (Terminal theme aware with highlights)
# =======================================================================================

set -g status-position bottom
set -g status-interval 2

# inherit terminal background
set -g status-style "bg=default,fg=default"
set -g message-style "bg=default,fg=default"

# pane borders
set -g pane-border-lines rounded
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour45"

setw -g window-style "bg=default"
setw -g window-active-style "bg=default"

set -g status-left-length 60
set -g status-right-length 100

# SESSION (highlight)
set -g status-left "#[bold,fg=colour45]#S#[default] "

# PATH
set -g status-right "#{b:pane_current_path}"

# window list centered
set -g status-justify centre

# inactive window
setw -g window-status-format "#[fg=colour245]#I:#W"

# active window highlight
setw -g window-status-current-format "#[bold,fg=colour45]#I:#W"

# =======================================================================================
# KEYBINDINGS
# =======================================================================================

bind r source-file ~/.config/tmux/.tmux.conf \; display-message "tmux config reloaded"

# splits
unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# pane navigation
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# window navigation
bind h previous-window
bind l next-window
bind j swap-window -t -1 \; previous-window
bind k swap-window -t +1 \; next-window

# resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# popup scratch terminal
bind -n M-g display-popup -w "80%" -h "80%" -E "tmux new-session -A -s scratch"

# =======================================================================================
# PLUGINS
# =======================================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

if-shell '[ ! -d ~/.config/tmux/plugins/tpm ]' \
 'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins"'

run '~/.config/tmux/plugins/tpm/tpm'
