# █░▀░█ █ █░▀█ █ █░▀░█ █▀█ █▄▄   ░█░ █░▀░█ █▄█ █░█
# =======================================================================================
# Author: Irwin Rex
# Best Practices: No subshells in status line, fully idempotent, native variables only.

# =======================================================================================
# CORE & PERFORMANCE
# =======================================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g history-limit 1000000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g assume-paste-time 0
set -g allow-passthrough on
set -g set-clipboard on

# =======================================================================================
# PREFIX
# =======================================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# =======================================================================================
# STATUS BAR
# =======================================================================================

set -g status-position bottom
set -g status-interval 2

set -g status-style "bg=default,fg=colour250"
set -g message-style "bg=default,fg=colour45"

set -g pane-border-lines rounded
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour45"

setw -g window-style bg=default
setw -g window-active-style bg=default

set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=colour45,bold]#S "
set -g status-right "#[fg=colour244]#{b:pane_current_path}"

set -g status-justify centre

setw -g window-status-format "#[fg=colour244]#I:#W"
setw -g window-status-current-format "#[fg=colour45,bold]#I:#W"

# =======================================================================================
# KEYBINDINGS
# =======================================================================================

# reload config
bind r source-file ~/.config/tmux/.tmux.conf \; display-message "Tmux Config Reloaded!"

# splits
unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ---------------------------------------------------------------------------------------
# Smart Pane Switching (Vim-Tmux-Navigator)
# ---------------------------------------------------------------------------------------
# This allows Ctrl+h/j/k/l to move seamlessly between vim and tmux panes
# See: https://github.com/christoomey/vim-tmux-navigator

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Allow clearing screen with Prefix + C-l since C-l is now navigation
bind C-l send-keys 'C-l'

# Copy mode navigation (matches vim movement)
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ---------------------------------------------------------------------------------------
# Standard Pane Navigation (Prefix + h/j/k/l)
# ---------------------------------------------------------------------------------------
# Keeping these as fallback
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------------------------------------------
# Window Navigation
# ---------------------------------------------------------------------------------------
bind H previous-window
bind L next-window
bind J swap-window -t -1 \; previous-window
bind K swap-window -t +1 \; next-window

# ---------------------------------------------------------------------------------------
# Pane Resize
# ---------------------------------------------------------------------------------------
# REMAPPED to Alt+Key to avoid conflict with Navigation
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Alternative: Use arrow keys for resizing
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# ---------------------------------------------------------------------------------------
# Scratch terminal
# ---------------------------------------------------------------------------------------
bind g display-popup -w "80%" -h "80%" -E "tmux new-session -A -s scratch"

# copy mode specifics
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =======================================================================================
# PLUGINS
# =======================================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

if-shell '[ ! -d ~/.config/tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins"'

run '~/.config/tmux/plugins/tpm/tpm'
