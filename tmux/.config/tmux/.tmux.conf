# █░▀░█ █ █░▀█ █ █░▀░█ █▀█ █▄▄   ░█░ █░▀░█ █▄█ █░█
# =======================================================================================
# Author: Irwin Rex
# Best Practices: No subshells in status line, fully idempotent, native variables only.

# =======================================================================================
# CORE & PERFORMANCE
# =======================================================================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g history-limit 100000000
set -g mouse on
set -sg escape-time 0
set -g focus-events on
set -g aggressive-resize on
set -g assume-paste-time 0
set -g allow-passthrough on
set -s set-clipboard external

# =======================================================================================
# PREFIX
# =======================================================================================

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# =======================================================================================
# STATUS BAR
# =======================================================================================

set -g status-position bottom
set -g status-interval 2

set -g status-style "bg=default,fg=colour250"
set -g message-style "bg=default,fg=colour45"

if-shell -b '[ "$(tmux -V | cut -d" " -f2)" >= "3.3" ]' \
  "set -g pane-border-lines rounded" \
  "set -g pane-border-lines single"

set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour45"

setw -g window-style bg=default
setw -g window-active-style bg=default

set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=colour45,bold]#S "
set -g status-right "#[fg=colour244]#{b:pane_current_path}"

set -g status-justify centre

setw -g window-status-format "#[fg=colour244]#I:#W"
setw -g window-status-current-format "#[fg=colour45,bold]#I:#W"

j =======================================================================================
# KEYBINDINGS
# =======================================================================================

# reload config
bind r source-file ~/.config/tmux/.tmux.conf \; display-message "Tmux Config Reloaded!"

# splits
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ---------------------------------------------------------------------------------------
# Pane Navigation (Prefix + h/j/k/l)
# ---------------------------------------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------------------------------------------
# Window Navigation (Prefix + Ctrl + a + Ctrl + h/j/k/l)
# ---------------------------------------------------------------------------------------

bind -r C-h previous-window
bind -r C-l next-window
bind -r C-j last-window       # Jump to most recently used window
bind -r C-k choose-tree -Z    # Open window picker/tree

# ---------------------------------------------------------------------------------------
# Pane Resizing
# ---------------------------------------------------------------------------------------
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Alternative: Arrow keys
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# ---------------------------------------------------------------------------------------
# Scratch terminal
# ---------------------------------------------------------------------------------------
bind g display-popup -w "80%" -h "80%" -E "tmux new-session -A -s scratch"

# Copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =======================================================================================
# PLUGINS
# =======================================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

if-shell '[ ! -d ~/.config/tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins"'

run '~/.config/tmux/plugins/tpm/tpm'
