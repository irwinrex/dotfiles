# =======================================================================================
# █▀▄▀█ █ █▄░█ █ █▀▄▀█ ▄▀█ █░░   ▀█▀ █▀▄▀█ █░█ ▀▄▀
# █░▀░█ █ █░▀█ █ █░▀░█ █▀█ █▄▄   ░█░ █░▀░█ █▄█ █░█
# =======================================================================================
# Author: Minimal Catppuccin Split-Pill Edition
# Best Practices: No subshells in status line, fully idempotent, native variables only.

# =======================================================================================
# 1. CORE & PERFORMANCE (Battle-Ready)
# =======================================================================================

# TrueColor, RGB, and Undercurl support for Neovim/Ghostty
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%&%d::%p1%{255}%&%d%;m' # undercurl colors

# Performance and usability
set -g history-limit 1000000        # Massive scrollback
set -g mouse on                     # Enable mouse support
set -sg escape-time 0               # Zero delay for Neovim Escape key
set -g focus-events on              # Let Neovim know when terminal gains focus
set -g aggressive-resize on         # Better resizing for multi-monitor
set -g assume-paste-time 0          # Prevent slow pasting
set -g allow-passthrough on         # Allow Yazi/images to render through tmux
set -g set-clipboard on             # Sync tmux clipboard with OS clipboard

# =======================================================================================
# 2. PREFIX & INDEXING
# =======================================================================================

# Change Prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start indexing at 1 (easier to reach on keyboard than 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on          # Re-index windows when one is closed

# =======================================================================================
# 3. MINIMAL SPLIT-PILL APPEARANCE (Catppuccin Mocha)
# =======================================================================================

# Modern Status Bar (Set to 'bottom' if you prefer)
set -g status-position bottom
set -g status-interval 2            # Update every 2 seconds

# Transparent background for the true "floating" look
set -g status-style "bg=default,fg=#cdd6f4"
set -g message-style "bg=#313244,fg=#a6e3a1,bold" # Command prompt style

# Native Rounded Pane Borders
set -g pane-border-lines rounded
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
setw -g window-style bg=default
setw -g window-active-style bg=default

# Lengths
set -g status-left-length 80
set -g status-right-length 80

# ----------------------------------------------------------------------
# LEFT MODULE: Session Name (Split Pill: Green Icon | Surface0 Text)
# ----------------------------------------------------------------------
set -g status-left "\
#[fg=#a6e3a1,bg=default]\
#[fg=#1e1e2e,bg=#a6e3a1,bold] 󰆍 \
#[fg=#cdd6f4,bg=#313244,nobold] #S \
#[fg=#313244,bg=default] "

# ----------------------------------------------------------------------
# RIGHT MODULE: Directory (Split Pill: Pink Icon | Surface0 Text)
# Uses #{b:pane_current_path} to keep it short, minimal, and fast
# ----------------------------------------------------------------------
set -g status-right "\
#[fg=#f5c2e7,bg=default]\
#[fg=#1e1e2e,bg=#f5c2e7,bold] 󰉋 \
#[fg=#cdd6f4,bg=#313244,nobold] #{b:pane_current_path} \
#[fg=#313244,bg=default]"

# ----------------------------------------------------------------------
# CENTER MODULES: Windows (Absolute Center, Split Pill Style)
# ----------------------------------------------------------------------
set -g status-justify absolute-centre
setw -g window-status-separator "  " # Spacing between pills

# Inactive Window (Surface0 Name | Blue Index)
setw -g window-status-format "\
#[fg=#313244,bg=default]\
#[fg=#cdd6f4,bg=#313244] #W \
#[fg=#1e1e2e,bg=#89b4fa,bold] #I \
#[fg=#89b4fa,bg=default]"

# Active Window (Surface0 Name | Peach Index)
setw -g window-status-current-format "\
#[fg=#313244,bg=default]\
#[fg=#cdd6f4,bg=#313244,bold] #W \
#[fg=#1e1e2e,bg=#fab387,bold] #I \
#[fg=#fab387,bg=default]"

# =======================================================================================
# 4. KEYBINDINGS (Idempotent & Clean)
# =======================================================================================

# Reload Config Seamlessly
bind r source-file ~/.config/tmux/.tmux.conf \; display-message " 󰚰  Tmux Config Reloaded!"

# Split Windows (Preserve Current Directory)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vi-Mode Copy Behavior
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane Navigation (Alt + hjkl) - Safe for Neovim Users
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Window Navigation (Prefix + hjkl)
bind h previous-window
bind l next-window
bind j swap-window -t -1 \; previous-window
bind k swap-window -t +1 \; next-window

# Pane Resizing (Prefix + HJKL)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Floating Terminal (Scratchpad)
bind -n M-g display-popup -w "80%" -h "80%" -E "tmux new-session -A -s scratch"

# =======================================================================================
# 5. PLUGINS & TPM (Safe Bootstrap)
# =======================================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Auto-save and restore sessions seamlessly
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Auto-Install TPM if not present
if-shell '[ ! -d ~/.config/tmux/plugins/tpm ]' \
  'run-shell "git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins"'

# Initialize TPM (Must be at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
